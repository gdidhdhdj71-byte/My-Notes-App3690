<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Nikola</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===================== LIST SCREEN ===================== -->
  <section id="screen-list" class="screen active">
    <header class="topbar">
      <button class="icon-btn" id="btn-menu" aria-label="Toggle dark mode">
        <svg viewBox="0 0 24 24" id="theme-icon"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>
      </button>
      <h1 class="topbar-title">Nikola</h1>
      <button class="icon-btn" id="btn-view-toggle" aria-label="Toggle view">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/></svg>
      </button>
    </header>

    <div class="searchbar">
      <svg viewBox="0 0 24 24" class="search-icon"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="search-input" placeholder="Search notes">
    </div>

    <div class="chip-row" id="color-filter-row">
      <button class="chip chip-all active" data-color="all">All</button>
      <button class="chip" data-color="yellow"><span class="chip-dot dot-yellow"></span>Yellow</button>
      <button class="chip" data-color="mint"><span class="chip-dot dot-mint"></span>Mint</button>
      <button class="chip" data-color="blue"><span class="chip-dot dot-blue"></span>Blue</button>
      <button class="chip" data-color="pink"><span class="chip-dot dot-pink"></span>Pink</button>
      <button class="chip" data-color="lavender"><span class="chip-dot dot-lavender"></span>Lavender</button>
      <button class="chip" data-color="gray"><span class="chip-dot dot-gray"></span>Gray</button>
    </div>

    <main id="notes-container" class="notes-grid"></main>

    <div id="empty-state" class="empty-state" hidden>
      <svg viewBox="0 0 24 24" width="56" height="56"><path d="M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v5h5"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="13" y2="16"/></svg>
      <p>No notes yet</p>
      <span>Tap the pencil to write your first note</span>
    </div>

    <button id="btn-add" class="fab" aria-label="New note">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </section>

  <!-- ===================== EDITOR SCREEN ===================== -->
  <section id="screen-editor" class="screen">
    <header class="topbar editor-topbar">
      <button class="icon-btn" id="btn-back" aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="editor-date" id="editor-date"></span>
      <button class="icon-btn" id="btn-pin" aria-label="Pin note">
        <svg viewBox="0 0 24 24"><path d="M12 2l1.5 5.5L19 9l-4.5 3L16 18l-4-3.5L8 18l1.5-6L5 9l5.5-1.5z"/></svg>
      </button>
      <button class="icon-btn" id="btn-delete" aria-label="Delete note">
        <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>
      </button>
    </header>

    <div class="editor-body">
      <input type="text" id="editor-title" class="editor-title" placeholder="Title" maxlength="80">
      <textarea id="editor-content" class="editor-content" placeholder="Note something down..."></textarea>
    </div>

    <div class="color-picker" id="color-picker">
      <button class="swatch swatch-yellow" data-color="yellow"></button>
      <button class="swatch swatch-mint" data-color="mint"></button>
      <button class="swatch swatch-blue" data-color="blue"></button>
      <button class="swatch swatch-pink" data-color="pink"></button>
      <button class="swatch swatch-lavender" data-color="lavender"></button>
      <button class="swatch swatch-gray" data-color="gray"></button>
    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script src="cordova.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
